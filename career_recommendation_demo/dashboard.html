<!DOCTYPE html>
<html>
<head>
    <title>AI Career Advisor</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 500px; background: white; padding: 30px; margin: auto; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .row { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #333; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; background: #007bff; color: white; padding: 12px; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Career Profile</h2>
        <form action="/recommend" method="POST">
            <div class="row"><label>Age</label><input type="number" name="Age" value="21"></div>
            <div class="row"><label>GPA</label><input type="number" step="0.1" name="GPA" value="3.5"></div>
            <div class="row"><label>Math Score (0-100)</label><input type="number" name="Math_Score" value="85"></div>
            <div class="row"><label>Creativity (0-100)</label><input type="number" name="Creativity_Index" value="70"></div>
            <div class="row"><label>Stress Level (0-100)</label><input type="number" name="Stress_Level" value="30"></div>
            <div class="row"><label>Motivation (0-100)</label><input type="number" name="Motivation_Level" value="80"></div>
            <div class="row"><label>Focus Duration (0-5)</label><input type="number" name="Focus_Duration" value="4"></div>
            <button type="submit">Analyze My Career</button>
        </form>
    </div>
</body>
</html>
