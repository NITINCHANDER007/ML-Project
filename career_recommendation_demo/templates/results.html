<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Recommendations</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <h1 class="text-center mb-5">AI-Powered Career Results</h1>
        <div class="row">
            {% for job in careers %}
            <div class="col-md-4 mb-4">
                <div class="card h-100 shadow-sm border-0">
                    <div class="card-body">
                        <h5 class="card-title text-primary">{{ job.title }}</h5>
                        <hr>
                        <p class="card-text"><strong>Skill Match:</strong> {{ job.cosine }}%</p>
                        <p class="card-text text-success"><strong>Final AI Fit:</strong> {{ job.ai_score }}%</p>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
        <div class="text-center mt-4">
            <a href="/" class="btn btn-secondary">Analyze New Profile</a>
        </div>
    </div>
</body>
</html>
